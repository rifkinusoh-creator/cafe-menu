<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คาเฟ่ ออเดอร์</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf6f0;
    --warm-white: #fffdf9;
    --brown-dark: #2c1a0e;
    --brown-mid: #6b3f1f;
    --brown-light: #c8956a;
    --accent: #d48b5a;
    --accent-soft: #f0d9c4;
    --green: #4a7c59;
    --red: #c0392b;
    --shadow: rgba(44,26,14,0.12);
    --card-shadow: 0 4px 20px rgba(44,26,14,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sarabun', sans-serif;
    background: var(--cream);
    color: var(--brown-dark);
    min-height: 100vh;
    padding-bottom: 160px;
  }

  /* HEADER */
  .header {
    background: var(--brown-dark);
    color: var(--cream);
    padding: 20px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .cafe-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    letter-spacing: 0.03em;
    color: var(--accent);
  }
  .cafe-sub {
    font-size: 0.72rem;
    color: rgba(250,246,240,0.55);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* TABLE SELECT */
  .table-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.07);
    border-radius: 10px;
    padding: 8px 12px;
  }
  .table-icon { font-size: 1rem; }
  .table-label { font-size: 0.8rem; color: rgba(250,246,240,0.7); }
  .table-select {
    background: var(--accent);
    color: var(--brown-dark);
    border: none;
    border-radius: 6px;
    padding: 4px 10px;
    font-family: 'Sarabun', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    outline: none;
  }

  /* CATEGORY TABS */
  .tabs-wrap {
    background: var(--warm-white);
    padding: 12px 16px;
    border-bottom: 1px solid var(--accent-soft);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tabs {
    display: flex;
    gap: 8px;
    width: max-content;
  }
  .tab {
    background: none;
    border: 1.5px solid var(--accent-soft);
    border-radius: 20px;
    padding: 6px 16px;
    font-family: 'Sarabun', sans-serif;
    font-size: 0.85rem;
    color: var(--brown-mid);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .tab.active {
    background: var(--brown-dark);
    border-color: var(--brown-dark);
    color: var(--cream);
  }
  .tab:hover:not(.active) {
    background: var(--accent-soft);
  }

  /* MENU GRID */
  .menu-section {
    padding: 16px;
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--brown-mid);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--accent-soft);
  }

  .menu-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }

  .menu-card {
    background: var(--warm-white);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: var(--card-shadow);
    transition: transform 0.18s, box-shadow 0.18s;
    cursor: pointer;
    position: relative;
  }
  .menu-card:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(44,26,14,0.15); }

  .menu-card.sold-out { opacity: 0.6; }
  .sold-out-badge {
    position: absolute;
    top: 8px; left: 8px;
    background: rgba(192,57,43,0.9);
    color: white;
    font-size: 0.68rem;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.04em;
  }

  .menu-img {
    width: 100%;
    aspect-ratio: 4/3;
    object-fit: cover;
    background: var(--accent-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
  }
  .img-placeholder {
    width: 100%;
    aspect-ratio: 4/3;
    background: linear-gradient(135deg, var(--accent-soft), #e8cdb0);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.8rem;
  }

  .menu-info {
    padding: 10px 12px 12px;
  }
  .menu-name {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--brown-dark);
    margin-bottom: 2px;
    line-height: 1.3;
  }
  .menu-desc {
    font-size: 0.72rem;
    color: var(--brown-light);
    margin-bottom: 8px;
    line-height: 1.4;
  }
  .menu-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .menu-price {
    font-size: 1rem;
    font-weight: 700;
    color: var(--brown-mid);
  }
  .menu-price span { font-size: 0.72rem; font-weight: 400; }

  .add-btn {
    background: var(--brown-dark);
    color: var(--cream);
    border: none;
    border-radius: 8px;
    width: 30px; height: 30px;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.18s, transform 0.1s;
  }
  .add-btn:active { transform: scale(0.9); }
  .add-btn:hover { background: var(--brown-mid); }
  .add-btn.in-cart { background: var(--green); }

  /* CART BAR */
  .cart-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--brown-dark);
    color: var(--cream);
    padding: 12px 20px;
    z-index: 200;
    transition: transform 0.3s;
  }
  .cart-bar.hidden { transform: translateY(100%); }
  .cart-bar-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .cart-info { font-size: 0.85rem; }
  .cart-count {
    background: var(--accent);
    color: var(--brown-dark);
    font-weight: 700;
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 0.85rem;
    margin-right: 8px;
  }
  .cart-total { font-weight: 600; font-size: 1rem; }
  .cart-total-label { font-size: 0.75rem; color: rgba(250,246,240,0.6); }

  .order-btn {
    background: var(--accent);
    color: var(--brown-dark);
    border: none;
    border-radius: 12px;
    padding: 12px 0;
    font-family: 'Sarabun', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    width: 100%;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: background 0.18s;
  }
  .order-btn:hover { background: var(--brown-light); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(44,26,14,0.5);
    z-index: 300;
    display: flex; align-items: flex-end;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--warm-white);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 32px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.3s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle {
    width: 36px; height: 4px;
    background: var(--accent-soft);
    border-radius: 2px;
    margin: 0 auto 20px;
  }
  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    margin-bottom: 16px;
    color: var(--brown-dark);
  }
  .cart-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--accent-soft);
  }
  .cart-item-name { font-size: 0.9rem; font-weight: 500; }
  .cart-item-price { font-size: 0.8rem; color: var(--brown-light); margin-top: 2px; }
  .qty-ctrl {
    display: flex; align-items: center; gap: 10px;
  }
  .qty-btn {
    background: var(--accent-soft);
    border: none;
    border-radius: 6px;
    width: 28px; height: 28px;
    font-size: 1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--brown-dark);
    font-weight: 700;
  }
  .qty-num { font-weight: 600; font-size: 0.95rem; min-width: 20px; text-align: center; }
  .empty-cart { text-align: center; color: var(--brown-light); font-size: 0.9rem; padding: 30px 0; }

  .modal-footer {
    margin-top: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-total { font-size: 1.1rem; font-weight: 700; }
  .modal-total-label { font-size: 0.78rem; color: var(--brown-light); }

  /* SUCCESS */
  .success-overlay {
    position: fixed; inset: 0;
    background: var(--brown-dark);
    z-index: 500;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .success-overlay.show { opacity: 1; pointer-events: all; }
  .success-icon { font-size: 4rem; margin-bottom: 16px; animation: pop 0.4s ease; }
  @keyframes pop { 0%{transform:scale(0)} 80%{transform:scale(1.15)} 100%{transform:scale(1)} }
  .success-title { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--accent); margin-bottom: 8px; }
  .success-sub { color: rgba(250,246,240,0.7); font-size: 0.9rem; text-align: center; line-height: 1.6; }
  .success-table { background: var(--accent); color: var(--brown-dark); font-weight: 700; border-radius: 8px; padding: 4px 14px; display: inline-block; margin: 12px 0; }
  .back-btn { margin-top: 24px; background: var(--accent-soft); color: var(--brown-dark); border: none; border-radius: 10px; padding: 12px 28px; font-family: 'Sarabun', sans-serif; font-size: 1rem; font-weight: 600; cursor: pointer; }

  /* BADGE on tab */
  .tab-badge { background: var(--accent); color: var(--brown-dark); font-size: 0.65rem; font-weight: 700; border-radius: 10px; padding: 1px 6px; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div>
      <div class="cafe-name">☕ Baan Café</div>
      <div class="cafe-sub">สั่งอาหาร & เครื่องดื่ม</div>
    </div>
    <div class="table-bar">
      <span class="table-icon">🪑</span>
      <span class="table-label">โต๊ะ</span>
      <select class="table-select" id="tableSelect">
        <option value="">เลือกโต๊ะ</option>
        <option value="1">โต๊ะ 1</option>
        <option value="2">โต๊ะ 2</option>
        <option value="3">โต๊ะ 3</option>
        <option value="4">โต๊ะ 4</option>
        <option value="5">โต๊ะ 5</option>
        <option value="6">โต๊ะ 6</option>
        <option value="7">โต๊ะ 7</option>
        <option value="8">โต๊ะ 8</option>
      </select>
    </div>
  </div>
  <!-- TABS -->
  <div class="tabs-wrap" style="padding:0;background:transparent;border:none;">
    <div class="tabs" id="tabs">
      <button class="tab active" onclick="filterCat('all',this)">🍽️ ทั้งหมด</button>
      <button class="tab" onclick="filterCat('coffee',this)">☕ กาแฟ</button>
      <button class="tab" onclick="filterCat('tea',this)">🍵 ชา</button>
      <button class="tab" onclick="filterCat('smoothie',this)">🥤 สมูทตี้</button>
      <button class="tab" onclick="filterCat('food',this)">🥐 อาหาร</button>
      <button class="tab" onclick="filterCat('dessert',this)">🍰 ของหวาน</button>
    </div>
  </div>
</div>

<!-- MENU -->
<div class="menu-section" id="menuSection"></div>

<!-- CART BAR -->
<div class="cart-bar hidden" id="cartBar">
  <div class="cart-bar-inner">
    <div class="cart-info">
      <span class="cart-count" id="cartCount">0</span>รายการ
    </div>
    <div>
      <div class="cart-total-label">ยอดรวม</div>
      <div class="cart-total">฿<span id="cartTotal">0</span></div>
    </div>
  </div>
  <button class="order-btn" onclick="openCart()">ดูออเดอร์และสั่งอาหาร →</button>
</div>

<!-- CART MODAL -->
<div class="modal-overlay" id="cartModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">🛒 ออเดอร์ของคุณ</div>
    <div id="cartItems"></div>
    <div class="modal-footer">
      <div>
        <div class="modal-total-label">ยอดรวมทั้งหมด</div>
        <div class="modal-total">฿<span id="modalTotal">0</span></div>
      </div>
      <button class="order-btn" style="width:auto;padding:12px 24px;" onclick="placeOrder()">สั่งอาหาร ✓</button>
    </div>
  </div>
</div>

<!-- SUCCESS -->
<div class="success-overlay" id="successOverlay">
  <div class="success-icon">✅</div>
  <div class="success-title">สั่งแล้วครับ!</div>
  <div class="success-table" id="successTable"></div>
  <div class="success-sub">ครัวได้รับออเดอร์แล้ว<br>กรุณารอสักครู่นะครับ ☕</div>
  <button class="back-btn" onclick="resetOrder()">กลับหน้าเมนู</button>
</div>

<script>
const MENU_URL = 'https://script.google.com/macros/s/AKfycbzBHskJaFhq3_iiRAVBcwpeTLwplDdhee-0YyaFN-6UFeIqUWk-4Evfyhmob5FwP6ku/exec';

const catEmoji = { coffee:'☕', tea:'🍵', smoothie:'🥤', food:'🥐', dessert:'🍰' };
const catDefault = { coffee:'☕', tea:'🍵', smoothie:'🥤', food:'🥐', dessert:'🍰' };
const catNames = { coffee:'☕ กาแฟ', tea:'🍵 ชา', smoothie:'🥤 สมูทตี้', food:'🥐 อาหาร', dessert:'🍰 ของหวาน' };

let menuData = [];
let cart = {};
let currentCat = 'all';

// โหลดเมนูจาก Google Sheet ด้วย JSONP (แก้ปัญหา CORS)
function loadMenu() {
  document.getElementById('menuSection').innerHTML = `
    <div style="text-align:center;padding:60px 20px;color:var(--brown-light);">
      <div style="font-size:2rem;margin-bottom:12px;">☕</div>
      <div>กำลังโหลดเมนู...</div>
    </div>`;

  window._menuCallback = function(data) {
    try {
      menuData = data.map(row => ({
        id: Number(row.id),
        name: row.name || '',
        desc: row.desc || '',
        price: Number(row.price) || 0,
        cat: (row.category || '').toLowerCase().trim(),
        soldOut: String(row.soldOut).toUpperCase() === 'TRUE',
        image: row.image || '',
        emoji: catDefault[(row.category||'').toLowerCase()] || '🍽️'
      }));
      renderMenu();
    } catch(e) { showMenuError(); }
  };

  const script = document.createElement('script');
  script.src = MENU_URL + '?callback=_menuCallback';
  script.onerror = showMenuError;
  script.id = 'jsonp-menu';
  const old = document.getElementById('jsonp-menu');
  if (old) old.remove();
  document.body.appendChild(script);

  // timeout 10 วินาที
  setTimeout(() => {
    if (!menuData.length) showMenuError();
  }, 10000);
}

function showMenuError() {
  document.getElementById('menuSection').innerHTML = `
    <div style="text-align:center;padding:60px 20px;color:#c0392b;">
      <div style="font-size:2rem;margin-bottom:12px;">⚠️</div>
      <div>โหลดเมนูไม่สำเร็จ</div>
      <div style="font-size:0.8rem;margin-top:8px;color:var(--brown-light);">กรุณารีเฟรชหน้านี้ใหม่ครับ</div>
      <button onclick="loadMenu()" style="margin-top:16px;background:var(--brown-dark);color:var(--cream);border:none;border-radius:8px;padding:10px 20px;font-family:'Sarabun',sans-serif;font-size:0.9rem;cursor:pointer;">🔄 ลองอีกครั้ง</button>
    </div>`;
}

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderMenu();
}

function renderMenu() {
  const section = document.getElementById('menuSection');
  const items = currentCat === 'all' ? menuData : menuData.filter(m => m.cat === currentCat);

  const cats = currentCat === 'all'
    ? [...new Set(menuData.map(m => m.cat))]
    : [currentCat];

  let html = '';
  cats.forEach(cat => {
    const catItems = items.filter(m => m.cat === cat);
    if (!catItems.length) return;
    const label = catNames[cat] || ('🍽️ ' + cat);
    html += `<div class="section-title">${label}</div><div class="menu-grid">`;
    catItems.forEach(item => {
      const inCart = cart[item.id] ? cart[item.id].qty > 0 : false;
      const imgHtml = item.image
        ? `<img src="${item.image}" alt="${item.name}" style="width:100%;aspect-ratio:4/3;object-fit:cover;display:block;" onerror="this.parentElement.innerHTML='<div class=\\'img-placeholder\\'>${item.emoji}</div>'">`
        : `<div class="img-placeholder">${item.emoji}</div>`;
      html += `
        <div class="menu-card ${item.soldOut ? 'sold-out' : ''}">
          ${item.soldOut ? '<div class="sold-out-badge">หมด</div>' : ''}
          ${imgHtml}
          <div class="menu-info">
            <div class="menu-name">${item.name}</div>
            <div class="menu-desc">${item.desc}</div>
            <div class="menu-footer">
              <div class="menu-price">฿${item.price} <span>บาท</span></div>
              ${!item.soldOut ? `<button class="add-btn ${inCart ? 'in-cart' : ''}" onclick="addToCart(${item.id})" id="btn-${item.id}">${inCart ? '✓' : '+'}</button>` : '<span style="font-size:0.75rem;color:#c0392b">หมด</span>'}
            </div>
          </div>
        </div>`;
    });
    html += '</div><br>';
  });

  if (!html) html = `<div style="text-align:center;padding:40px;color:var(--brown-light);">ไม่มีเมนูในหมวดนี้</div>`;
  section.innerHTML = html;
}

function addToCart(id) {
  const item = menuData.find(m => m.id === id);
  if (!item || item.soldOut) return;
  if (!cart[id]) cart[id] = { item, qty: 0 };
  cart[id].qty++;
  updateCartBar();
  const btn = document.getElementById('btn-'+id);
  if (btn) { btn.textContent = '✓'; btn.classList.add('in-cart'); }
}

function updateCartBar() {
  const totalQty = Object.values(cart).reduce((s, v) => s + v.qty, 0);
  const totalPrice = Object.values(cart).reduce((s, v) => s + v.qty * v.item.price, 0);
  document.getElementById('cartCount').textContent = totalQty;
  document.getElementById('cartTotal').textContent = totalPrice;
  document.getElementById('cartBar').classList.toggle('hidden', totalQty === 0);
}

function openCart() {
  renderCartModal();
  document.getElementById('cartModal').classList.add('open');
}
document.getElementById('cartModal').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('open');
});

function renderCartModal() {
  const entries = Object.values(cart).filter(v => v.qty > 0);
  const total = entries.reduce((s, v) => s + v.qty * v.item.price, 0);
  let html = '';
  if (!entries.length) {
    html = '<div class="empty-cart">ยังไม่มีรายการในออเดอร์</div>';
  } else {
    entries.forEach(({item, qty}) => {
      html += `
        <div class="cart-item">
          <div>
            <div class="cart-item-name">${item.emoji} ${item.name}</div>
            <div class="cart-item-price">฿${item.price} × ${qty} = ฿${item.price * qty}</div>
          </div>
          <div class="qty-ctrl">
            <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
            <span class="qty-num">${qty}</span>
            <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
          </div>
        </div>`;
    });
  }
  document.getElementById('cartItems').innerHTML = html;
  document.getElementById('modalTotal').textContent = total;
}

function changeQty(id, delta) {
  if (!cart[id]) return;
  cart[id].qty = Math.max(0, cart[id].qty + delta);
  if (cart[id].qty === 0) delete cart[id];
  updateCartBar();
  renderCartModal();
  renderMenu();
}

async function placeOrder() {
  const table = document.getElementById('tableSelect').value;
  if (!table) { alert('⚠️ กรุณาเลือกโต๊ะก่อนสั่งอาหารครับ'); return; }
  const entries = Object.values(cart).filter(v => v.qty > 0);
  if (!entries.length) { alert('⚠️ ยังไม่มีรายการในออเดอร์'); return; }

  // แสดง loading
  const orderBtn = document.querySelector('.modal-footer .order-btn');
  orderBtn.textContent = '⏳ กำลังส่งออเดอร์...';
  orderBtn.disabled = true;

  const itemsText = entries.map(({item, qty}) => `${item.name} x${qty}`).join(', ');
  const total = entries.reduce((s, v) => s + v.qty * v.item.price, 0);

  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzBHskJaFhq3_iiRAVBcwpeTLwplDdhee-0YyaFN-6UFeIqUWk-4Evfyhmob5FwP6ku/exec';

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ table, items: itemsText, total })
    });
    // no-cors ไม่รู้ response จริง แต่ถ้าไม่ throw = ส่งไปแล้ว
    document.getElementById('cartModal').classList.remove('open');
    document.getElementById('successTable').textContent = `โต๊ะ ${table}`;
    document.getElementById('successOverlay').classList.add('show');
  } catch(err) {
    alert('❌ เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้งครับ\n' + err.message);
  } finally {
    orderBtn.textContent = 'สั่งอาหาร ✓';
    orderBtn.disabled = false;
  }
}

function resetOrder() {
  cart = {};
  document.getElementById('tableSelect').value = '';
  updateCartBar();
  document.getElementById('successOverlay').classList.remove('show');
  loadMenu();
}

// Auto-select table from QR Code URL ?table=X
const urlParams = new URLSearchParams(window.location.search);
const tableParam = urlParams.get('table');
if (tableParam) document.getElementById('tableSelect').value = tableParam;

// โหลดเมนูจาก Google Sheet
loadMenu();
</script>
</body>
</html>
