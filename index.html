<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baan Café</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f7f5f2;
  --white:#ffffff;
  --border:#e8e4de;
  --text:#1c1917;
  --sub:#a09589;
  --accent:#c97941;
  --accent-bg:#fdf6ee;
  --green:#3d7a56;
  --red:#b91c1c;
  --r:16px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:150px;}

/* HEADER */
.header{background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;padding:0 20px;}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:18px 0 12px;}
.brand-name{font-family:'DM Serif Display',serif;font-size:1.35rem;color:var(--text);letter-spacing:-0.01em;}
.brand-name span{color:var(--accent);}
.brand-sub{font-size:0.65rem;color:var(--sub);letter-spacing:0.1em;text-transform:uppercase;margin-top:1px;}

.table-pill{display:flex;align-items:center;gap:6px;background:var(--accent-bg);border:1px solid #e8c9a0;border-radius:24px;padding:6px 14px;}
.table-pill label{font-size:0.72rem;color:var(--accent);font-weight:600;letter-spacing:0.04em;}
.table-select{background:none;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:0.82rem;font-weight:600;color:var(--text);cursor:pointer;}

/* TABS */
.tabs-row{overflow-x:auto;scrollbar-width:none;padding-bottom:14px;}
.tabs-row::-webkit-scrollbar{display:none;}
.tabs{display:flex;gap:6px;width:max-content;}
.tab{border:1.5px solid transparent;background:none;font-family:'DM Sans',sans-serif;font-size:0.78rem;font-weight:500;color:var(--sub);padding:5px 16px;border-radius:24px;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.tab.active{background:var(--text);color:#fff;border-color:var(--text);font-weight:600;}
.tab:hover:not(.active){border-color:var(--border);color:var(--text);}

/* MENU */
.menu-wrap{padding:20px 16px 0;}
.section-label{font-size:0.62rem;font-weight:600;color:var(--sub);letter-spacing:0.14em;text-transform:uppercase;margin:0 0 14px;display:flex;align-items:center;gap:10px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.menu-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:28px;}

.card{background:var(--white);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;position:relative;transition:box-shadow 0.2s,transform 0.2s;}
.card:active{transform:scale(0.98);}
.card.sold{opacity:0.45;}
.sold-tag{position:absolute;top:8px;left:8px;background:var(--red);color:#fff;font-size:0.58rem;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:0.04em;}

.card-img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;}
.card-img-ph{width:100%;aspect-ratio:4/3;background:linear-gradient(135deg,#fdf0e4,#f5e4ce);display:flex;align-items:center;justify-content:center;font-size:2.4rem;}

.card-body{padding:10px 12px 12px;}
.card-name{font-size:0.84rem;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:3px;}
.card-desc{font-size:0.68rem;color:var(--sub);line-height:1.45;margin-bottom:8px;}
.card-foot{display:flex;align-items:center;justify-content:space-between;}
.card-price{font-size:0.94rem;font-weight:700;color:var(--text);}
.card-price small{font-size:0.6rem;font-weight:400;color:var(--sub);}

.add-btn{width:28px;height:28px;border-radius:8px;border:none;background:var(--text);color:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.14s,transform 0.1s;flex-shrink:0;}
.add-btn:active{transform:scale(0.82);}
.add-btn.in-cart{background:var(--green);}

/* CART BAR */
.cart-bar{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);padding:14px 18px max(20px,env(safe-area-inset-bottom));z-index:200;box-shadow:0 -4px 24px rgba(0,0,0,0.07);transition:transform 0.3s;}
.cart-bar.hidden{transform:translateY(110%);}
.cart-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cart-meta{display:flex;align-items:center;gap:8px;}
.cart-badge{background:var(--accent);color:#fff;font-size:0.68rem;font-weight:700;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.cart-meta-label{font-size:0.76rem;color:var(--sub);}
.cart-price-lbl{font-size:0.65rem;color:var(--sub);text-align:right;}
.cart-price-val{font-size:1.05rem;font-weight:700;color:var(--text);text-align:right;}
.cart-cta{width:100%;background:var(--text);color:#fff;border:none;border-radius:14px;padding:14px;font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:600;cursor:pointer;letter-spacing:0.01em;transition:opacity 0.15s;}
.cart-cta:active{opacity:0.8;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(28,25,23,0.25);z-index:300;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity 0.22s;backdrop-filter:blur(4px);}
.overlay.open{opacity:1;pointer-events:all;}
.sheet{background:var(--white);border-radius:22px 22px 0 0;padding:0 18px max(28px,env(safe-area-inset-bottom));width:100%;max-height:72vh;overflow-y:auto;transform:translateY(100%);transition:transform 0.28s cubic-bezier(.32,.72,0,1);}
.overlay.open .sheet{transform:translateY(0);}
.handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:14px auto 20px;}
.sheet-title{font-family:'DM Serif Display',serif;font-size:1.1rem;margin-bottom:16px;color:var(--text);}

.ci{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);}
.ci-name{font-size:0.87rem;font-weight:500;}
.ci-sub{font-size:0.68rem;color:var(--sub);margin-top:3px;}
.qty-row{display:flex;align-items:center;gap:8px;}
.qty-btn{width:26px;height:26px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);font-size:0.9rem;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;font-weight:600;}
.qty-n{font-weight:700;font-size:0.9rem;min-width:18px;text-align:center;}

.sheet-foot{margin-top:20px;display:flex;align-items:center;justify-content:space-between;}
.stotal-lbl{font-size:0.68rem;color:var(--sub);margin-bottom:2px;}
.stotal-val{font-size:1.1rem;font-weight:700;}
.place-btn{background:var(--accent);color:#fff;border:none;border-radius:14px;padding:13px 24px;font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:600;cursor:pointer;transition:opacity 0.15s;}
.place-btn:active{opacity:0.8;}
.empty-cart{text-align:center;padding:32px 0;color:var(--sub);font-size:0.85rem;}

/* SUCCESS */
.success-screen{position:fixed;inset:0;background:var(--white);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.success-screen.show{opacity:1;pointer-events:all;}
.s-icon{font-size:3rem;animation:pop 0.4s ease;}
@keyframes pop{0%{transform:scale(0)}80%{transform:scale(1.18)}100%{transform:scale(1)}}
.s-h{font-family:'DM Serif Display',serif;font-size:1.5rem;color:var(--text);}
.s-table{background:var(--accent-bg);color:var(--accent);font-weight:700;border-radius:20px;padding:5px 20px;font-size:0.82rem;border:1px solid #e8c9a0;}
.s-sub{font-size:0.8rem;color:var(--sub);text-align:center;line-height:1.8;}
.s-back{margin-top:8px;background:var(--text);color:#fff;border:none;border-radius:14px;padding:13px 30px;font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:600;cursor:pointer;}

/* STATE */
.state{text-align:center;padding:72px 20px;color:var(--sub);}
.state .ico{font-size:2rem;margin-bottom:12px;}
.state-btn{margin-top:14px;background:var(--text);color:#fff;border:none;border-radius:12px;padding:10px 22px;font-family:'DM Sans',sans-serif;font-size:0.85rem;cursor:pointer;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="brand-name">Baan <span>Café</span></div>
      <div class="brand-sub">Order & Enjoy</div>
    </div>
    <div class="table-pill">
      <label>โต๊ะ</label>
      <select class="table-select" id="tableSelect">
        <option value="">เลือก</option>
        <option>1</option><option>2</option><option>3</option><option>4</option>
        <option>5</option><option>6</option><option>7</option><option>8</option>
      </select>
    </div>
  </div>
  <div class="tabs-row">
    <div class="tabs">
      <button class="tab active" onclick="filterCat('all',this)">ทั้งหมด</button>
      <button class="tab" onclick="filterCat('coffee',this)">กาแฟ</button>
      <button class="tab" onclick="filterCat('tea',this)">ชา</button>
      <button class="tab" onclick="filterCat('smoothie',this)">สมูทตี้</button>
      <button class="tab" onclick="filterCat('food',this)">อาหาร</button>
      <button class="tab" onclick="filterCat('dessert',this)">ของหวาน</button>
    </div>
  </div>
</div>

<div class="menu-wrap" id="menuWrap"></div>

<div class="cart-bar hidden" id="cartBar">
  <div class="cart-row">
    <div class="cart-meta">
      <div class="cart-badge" id="cartCount">0</div>
      <div class="cart-meta-label">รายการ</div>
    </div>
    <div>
      <div class="cart-price-lbl">ยอดรวม</div>
      <div class="cart-price-val">฿<span id="cartTotal">0</span></div>
    </div>
  </div>
  <button class="cart-cta" onclick="openCart()">ดูออเดอร์และสั่งอาหาร</button>
</div>

<div class="overlay" id="cartOverlay">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title">ออเดอร์ของคุณ</div>
    <div id="cartItems"></div>
    <div class="sheet-foot">
      <div>
        <div class="stotal-lbl">ยอดรวม</div>
        <div class="stotal-val">฿<span id="modalTotal">0</span></div>
      </div>
      <button class="place-btn" onclick="placeOrder()">สั่งอาหาร</button>
    </div>
  </div>
</div>

<div class="success-screen" id="successScreen">
  <div class="s-icon">✓</div>
  <div class="s-h">ส่งออเดอร์แล้ว</div>
  <div class="s-table" id="successTable"></div>
  <div class="s-sub">ครัวได้รับออเดอร์แล้วครับ<br>กรุณารอสักครู่</div>
  <button class="s-back" onclick="resetOrder()">กลับหน้าเมนู</button>
</div>

<script>
const MENU_URL   = 'https://script.google.com/macros/s/AKfycbx5I8XbCwxc9rnjF1kN5VclevV0tWOzluMDf8jJaz2omneEOa3zH6sXRc-51pmHugQZ/exec';
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx5I8XbCwxc9rnjF1kN5VclevV0tWOzluMDf8jJaz2omneEOa3zH6sXRc-51pmHugQZ/exec';
const catLabels  = {coffee:'กาแฟ',tea:'ชา',smoothie:'สมูทตี้',food:'อาหาร',dessert:'ของหวาน'};
const catEmoji   = {coffee:'☕',tea:'🍵',smoothie:'🥤',food:'🍽️',dessert:'🍰'};

let menuData=[], cart={}, currentCat='all';

function loadMenu() {
  document.getElementById('menuWrap').innerHTML='<div class="state"><div class="ico">☕</div><div>กำลังโหลดเมนู...</div></div>';
  window._menuCb = data => {
    menuData = data.map(r=>({
      id:Number(r.id), name:r.name||'', desc:r.desc||'',
      price:Number(r.price)||0, cat:(r.category||'').toLowerCase().trim(),
      soldOut:String(r.soldOut).toUpperCase()==='TRUE',
      image:r.image||'', emoji:catEmoji[(r.category||'').toLowerCase()]||'🍽️'
    }));
    renderMenu();
  };
  const old=document.getElementById('_jm'); if(old) old.remove();
  const s=document.createElement('script'); s.id='_jm';
  s.onerror=()=>{ document.getElementById('menuWrap').innerHTML='<div class="state"><div class="ico">⚠️</div><div>โหลดไม่สำเร็จ</div><button class="state-btn" onclick="loadMenu()">ลองอีกครั้ง</button></div>'; };
  s.src=MENU_URL+'?callback=_menuCb&t='+Date.now();
  document.body.appendChild(s);
  setTimeout(()=>{ if(!menuData.length) s.onerror(); },10000);
}

function filterCat(cat,btn) {
  currentCat=cat;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active'); renderMenu();
}

function renderMenu() {
  const wrap=document.getElementById('menuWrap');
  const items=currentCat==='all'?menuData:menuData.filter(m=>m.cat===currentCat);
  const cats=currentCat==='all'?[...new Set(menuData.map(m=>m.cat))]:[currentCat];
  let html='';
  cats.forEach(cat=>{
    const ci=items.filter(m=>m.cat===cat); if(!ci.length) return;
    html+=`<div class="section-label">${catLabels[cat]||cat}</div><div class="menu-grid">`;
    ci.forEach(item=>{
      const ic=cart[item.id]?.qty>0;
      const img=item.image
        ?`<img class="card-img" src="${item.image}" alt="${item.name}" onerror="this.outerHTML='<div class=\\'card-img-ph\\'>${item.emoji}</div>'">`
        :`<div class="card-img-ph">${item.emoji}</div>`;
      html+=`<div class="card${item.soldOut?' sold':''}">
        ${item.soldOut?'<div class="sold-tag">หมด</div>':''}${img}
        <div class="card-body">
          <div class="card-name">${item.name}</div>
          <div class="card-desc">${item.desc}</div>
          <div class="card-foot">
            <div class="card-price">฿${item.price}<small> บาท</small></div>
            ${!item.soldOut
              ?`<button class="add-btn${ic?' in-cart':''}" onclick="addToCart(${item.id})" id="btn-${item.id}">${ic?'✓':'+'}</button>`
              :'<span style="font-size:0.68rem;color:var(--red)">หมด</span>'}
          </div>
        </div></div>`;
    });
    html+='</div>';
  });
  wrap.innerHTML=html||'<div class="state"><div class="ico">🍽️</div><div>ไม่มีเมนูในหมวดนี้</div></div>';
}

function addToCart(id) {
  const item=menuData.find(m=>m.id===id); if(!item||item.soldOut) return;
  if(!cart[id]) cart[id]={item,qty:0}; cart[id].qty++;
  updateCartBar();
  const btn=document.getElementById('btn-'+id);
  if(btn){btn.textContent='✓';btn.classList.add('in-cart');}
}
function updateCartBar() {
  const qty=Object.values(cart).reduce((s,v)=>s+v.qty,0);
  const price=Object.values(cart).reduce((s,v)=>s+v.qty*v.item.price,0);
  document.getElementById('cartCount').textContent=qty;
  document.getElementById('cartTotal').textContent=price;
  document.getElementById('cartBar').classList.toggle('hidden',qty===0);
}
function openCart(){renderCartItems();document.getElementById('cartOverlay').classList.add('open');}
document.getElementById('cartOverlay').addEventListener('click',e=>{if(e.target.id==='cartOverlay')e.target.classList.remove('open');});
function renderCartItems(){
  const entries=Object.values(cart).filter(v=>v.qty>0);
  const total=entries.reduce((s,v)=>s+v.qty*v.item.price,0);
  document.getElementById('cartItems').innerHTML=!entries.length
    ?'<div class="empty-cart">ยังไม่มีรายการ</div>'
    :entries.map(({item,qty})=>`<div class="ci"><div><div class="ci-name">${item.name}</div><div class="ci-sub">฿${item.price} × ${qty} = ฿${item.price*qty}</div></div><div class="qty-row"><button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button><span class="qty-n">${qty}</span><button class="qty-btn" onclick="changeQty(${item.id},1)">+</button></div></div>`).join('');
  document.getElementById('modalTotal').textContent=total;
}
function changeQty(id,d){
  if(!cart[id])return; cart[id].qty=Math.max(0,cart[id].qty+d);
  if(!cart[id].qty)delete cart[id];
  updateCartBar();renderCartItems();renderMenu();
}
async function placeOrder(){
  const table=document.getElementById('tableSelect').value;
  if(!table){alert('กรุณาเลือกโต๊ะก่อนครับ');return;}
  const entries=Object.values(cart).filter(v=>v.qty>0);
  if(!entries.length){alert('ยังไม่มีรายการในออเดอร์');return;}
  const btn=document.querySelector('.place-btn');
  btn.textContent='กำลังส่ง...';btn.disabled=true;
  const itemsText=entries.map(({item,qty})=>`${item.name} x${qty}`).join(', ');
  const total=entries.reduce((s,v)=>s+v.qty*v.item.price,0);
  try{
    await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({table,items:itemsText,total})});
    document.getElementById('cartOverlay').classList.remove('open');
    document.getElementById('successTable').textContent=`โต๊ะ ${table}`;
    document.getElementById('successScreen').classList.add('show');
  }catch(e){alert('เกิดข้อผิดพลาด กรุณาลองใหม่ครับ');}
  finally{btn.textContent='สั่งอาหาร';btn.disabled=false;}
}
function resetOrder(){
  cart={};document.getElementById('tableSelect').value='';
  updateCartBar();document.getElementById('successScreen').classList.remove('show');loadMenu();
}
const p=new URLSearchParams(location.search).get('table');
if(p) document.getElementById('tableSelect').value=p;
loadMenu();
</script>
</body>
</html>
