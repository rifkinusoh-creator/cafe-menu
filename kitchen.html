<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>หน้าครัว — Baan Café</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1208;
    --surface: #241a0f;
    --card: #2e2010;
    --border: #3d2d18;
    --accent: #d48b5a;
    --accent-soft: #3d2810;
    --cream: #faf6f0;
    --muted: #8b6347;
    --green: #27ae60;
    --green-soft: #0d2e1a;
    --orange: #e67e22;
    --orange-soft: #2e1e08;
    --red: #e74c3c;
    --red-soft: #2e0e0a;
    --blue: #3498db;
    --blue-soft: #0a1e2e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sarabun', sans-serif;
    background: var(--bg);
    color: var(--cream);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--accent); }
  .badge-kitchen {
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 0.72rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid var(--accent);
    letter-spacing: 0.06em;
  }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .live-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }
  .live-text { font-size: 0.8rem; color: var(--green); }
  .refresh-btn {
    background: var(--accent-soft);
    color: var(--accent);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    font-family: 'Sarabun', sans-serif;
    font-size: 0.82rem;
    cursor: pointer;
    transition: background 0.18s;
  }
  .refresh-btn:hover { background: var(--border); }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 12px;
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 18px;
    text-align: center;
    min-width: 100px;
    flex-shrink: 0;
  }
  .stat-num { font-size: 1.5rem; font-weight: 700; }
  .stat-label { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
  .stat.waiting .stat-num { color: var(--orange); }
  .stat.cooking .stat-num { color: var(--blue); }
  .stat.done .stat-num { color: var(--green); }
  .stat.total .stat-num { color: var(--accent); }

  /* FILTER TABS */
  .filter-bar {
    display: flex;
    gap: 8px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .filter-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 16px;
    font-family: 'Sarabun', sans-serif;
    font-size: 0.82rem;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.18s;
  }
  .filter-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }

  /* ORDERS GRID */
  .orders-wrap { padding: 20px 24px; }
  .orders-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  /* ORDER CARD */
  .order-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: transform 0.18s, box-shadow 0.18s;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .order-card:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,0.3); }

  .order-card.waiting { border-left: 4px solid var(--orange); }
  .order-card.cooking { border-left: 4px solid var(--blue); }
  .order-card.done { border-left: 4px solid var(--green); opacity: 0.7; }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
  }
  .table-name { font-size: 1.1rem; font-weight: 700; color: var(--cream); }
  .order-time { font-size: 0.75rem; color: var(--muted); }

  .status-badge {
    font-size: 0.72rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.04em;
  }
  .status-badge.waiting { background: var(--orange-soft); color: var(--orange); border: 1px solid var(--orange); }
  .status-badge.cooking { background: var(--blue-soft); color: var(--blue); border: 1px solid var(--blue); }
  .status-badge.done { background: var(--green-soft); color: var(--green); border: 1px solid var(--green); }

  .card-items {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .item-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 5px 0;
    font-size: 0.9rem;
    color: var(--cream);
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .item-row:last-child { border-bottom: none; }
  .item-dot { color: var(--accent); margin-top: 2px; font-size: 0.7rem; flex-shrink: 0; }

  .card-footer {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .order-total { font-size: 0.95rem; font-weight: 700; color: var(--accent); }

  .action-btns { display: flex; gap: 8px; }
  .action-btn {
    border: none;
    border-radius: 8px;
    padding: 7px 14px;
    font-family: 'Sarabun', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.18s, transform 0.1s;
  }
  .action-btn:active { transform: scale(0.95); }
  .btn-cooking { background: var(--blue); color: white; }
  .btn-done { background: var(--green); color: white; }
  .btn-waiting { background: var(--orange); color: white; }
  .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* EMPTY */
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-text { font-size: 1rem; }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent);
    color: var(--bg);
    padding: 10px 24px;
    border-radius: 20px;
    font-weight: 600;
    font-size: 0.9rem;
    transition: transform 0.3s;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* NEW ORDER ALERT */
  .new-alert {
    position: fixed;
    top: 80px; right: 20px;
    background: var(--orange);
    color: white;
    padding: 12px 20px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 0.95rem;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    transform: translateX(200%);
    transition: transform 0.3s;
    z-index: 999;
  }
  .new-alert.show { transform: translateX(0); }

  @media (max-width: 600px) {
    .orders-wrap { padding: 14px; }
    .stats-bar { padding: 12px 14px; }
    .filter-bar { padding: 10px 14px; }
    .header { padding: 12px 14px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="logo">☕ Baan Café</div>
    <div class="badge-kitchen">🍳 หน้าครัว</div>
  </div>
  <div class="header-right">
    <div class="live-dot"></div>
    <div class="live-text">Live</div>
    <button class="refresh-btn" onclick="loadOrders()">🔄 รีเฟรช</button>
  </div>
</div>

<!-- STATS -->
<div class="stats-bar">
  <div class="stat waiting">
    <div class="stat-num" id="stat-waiting">0</div>
    <div class="stat-label">⏳ รอดำเนินการ</div>
  </div>
  <div class="stat cooking">
    <div class="stat-num" id="stat-cooking">0</div>
    <div class="stat-label">🔥 กำลังทำ</div>
  </div>
  <div class="stat done">
    <div class="stat-num" id="stat-done">0</div>
    <div class="stat-label">✅ เสร็จแล้ว</div>
  </div>
  <div class="stat total">
    <div class="stat-num" id="stat-total">0</div>
    <div class="stat-label">📋 ทั้งหมดวันนี้</div>
  </div>
</div>

<!-- FILTER -->
<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter('all', this)">ทั้งหมด</button>
  <button class="filter-btn" onclick="setFilter('รอดำเนินการ', this)">⏳ รอดำเนินการ</button>
  <button class="filter-btn" onclick="setFilter('กำลังทำ', this)">🔥 กำลังทำ</button>
  <button class="filter-btn" onclick="setFilter('เสร็จแล้ว', this)">✅ เสร็จแล้ว</button>
</div>

<!-- ORDERS -->
<div class="orders-wrap">
  <div class="orders-grid" id="ordersGrid">
    <div class="loading">
      <div class="spinner"></div>
      <div>กำลังโหลดออเดอร์...</div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>
<div class="new-alert" id="newAlert">🔔 มีออเดอร์ใหม่!</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxIXMD0vGYODQvZodCgZSH1C_H-RIPvA3fDTYigMGfKeaPr1jHiDbWIZ-kVRN91ThPP/exec';

let allOrders = [];
let currentFilter = 'all';
let lastCount = 0;
let isFirstLoad = true;

const statusMap = {
  'รอดำเนินการ': 'waiting',
  'กำลังทำ': 'cooking',
  'เสร็จแล้ว': 'done'
};

function loadOrders() {
  window._ordersCallback = function(data) {
    const prev = allOrders.length;
    allOrders = data;
    updateStats();
    renderOrders();
    if (!isFirstLoad && data.length > prev) {
      showNewAlert();
    }
    isFirstLoad = false;
  };
  const script = document.createElement('script');
  script.src = `${SCRIPT_URL}?type=orders&callback=_ordersCallback&t=${Date.now()}`;
  script.id = 'jsonp-orders';
  const old = document.getElementById('jsonp-orders');
  if (old) old.remove();
  document.body.appendChild(script);
}

function updateStats() {
  const waiting = allOrders.filter(o => o.status === 'รอดำเนินการ').length;
  const cooking = allOrders.filter(o => o.status === 'กำลังทำ').length;
  const done = allOrders.filter(o => o.status === 'เสร็จแล้ว').length;
  document.getElementById('stat-waiting').textContent = waiting;
  document.getElementById('stat-cooking').textContent = cooking;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-total').textContent = allOrders.length;
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
}

function renderOrders() {
  const grid = document.getElementById('ordersGrid');
  const filtered = currentFilter === 'all'
    ? allOrders
    : allOrders.filter(o => o.status === currentFilter);

  if (!filtered.length) {
    grid.innerHTML = `
      <div class="empty" style="grid-column:1/-1">
        <div class="empty-icon">🍽️</div>
        <div class="empty-text">ไม่มีออเดอร์ในขณะนี้</div>
      </div>`;
    return;
  }

  grid.innerHTML = filtered.map(order => {
    const cls = statusMap[order.status] || 'waiting';
    const items = (order.items || '').split(',').map(i => i.trim()).filter(Boolean);
    const itemsHtml = items.map(i => `
      <div class="item-row">
        <span class="item-dot">●</span>
        <span>${i}</span>
      </div>`).join('');

    let btns = '';
    if (order.status === 'รอดำเนินการ') {
      btns = `<button class="action-btn btn-cooking" onclick="updateStatus(this, '${order.timestamp}', '${order.table}', 'กำลังทำ')">🔥 เริ่มทำ</button>`;
    } else if (order.status === 'กำลังทำ') {
      btns = `
        <button class="action-btn btn-waiting" onclick="updateStatus(this, '${order.timestamp}', '${order.table}', 'รอดำเนินการ')">↩ ย้อนกลับ</button>
        <button class="action-btn btn-done" onclick="updateStatus(this, '${order.timestamp}', '${order.table}', 'เสร็จแล้ว')">✅ เสร็จ</button>`;
    } else {
      btns = `<button class="action-btn btn-waiting" onclick="updateStatus(this, '${order.timestamp}', '${order.table}', 'รอดำเนินการ')">↩ เปิดใหม่</button>`;
    }

    return `
      <div class="order-card ${cls}">
        <div class="card-header">
          <div>
            <div class="table-name">🪑 ${order.table}</div>
            <div class="order-time">⏰ ${order.timestamp}</div>
          </div>
          <div class="status-badge ${cls}">${order.status}</div>
        </div>
        <div class="card-items">${itemsHtml}</div>
        <div class="card-footer">
          <div class="order-total">${order.total}</div>
          <div class="action-btns">${btns}</div>
        </div>
      </div>`;
  }).join('');
}

function updateStatus(btn, timestamp, table, newStatus) {
  btn.disabled = true;
  btn.textContent = '⏳...';

  fetch(SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'updateStatus', timestamp, table, status: newStatus })
  }).then(() => {
    // อัปเดต local state ทันที
    const order = allOrders.find(o => String(o.timestamp) === String(timestamp) && o.table === table);
    if (order) order.status = newStatus;
    updateStats();
    renderOrders();
    showToast(`อัปเดตสถานะเป็น "${newStatus}" แล้วครับ ✓`);
  }).catch(() => {
    showToast('❌ อัปเดตไม่สำเร็จ ลองใหม่อีกครั้ง');
    btn.disabled = false;
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function showNewAlert() {
  const a = document.getElementById('newAlert');
  a.classList.add('show');
  setTimeout(() => a.classList.remove('show'), 3000);
  // เล่นเสียงแจ้งเตือน
  try {
    const ctx = new AudioContext();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.setValueAtTime(880, ctx.currentTime);
    o.frequency.setValueAtTime(660, ctx.currentTime + 0.1);
    g.gain.setValueAtTime(0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    o.start(); o.stop(ctx.currentTime + 0.4);
  } catch(e) {}
}

// โหลดครั้งแรก
loadOrders();

// Auto-refresh ทุก 30 วินาที
setInterval(loadOrders, 30000);
</script>
</body>
</html>
